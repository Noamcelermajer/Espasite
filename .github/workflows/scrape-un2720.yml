# Scrape UN2720 tracking dashboard and commit data to repo (4x daily).
# Data is written to public/data/un2720.json; the site reads it at /data/un2720.json.
name: Scrape UN2720 data

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC (4x per day)
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape:un2720
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/un2720.json
          git diff --staged --quiet || (git commit -m "chore: update UN2720 scraped data" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
