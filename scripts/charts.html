<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UN2720 Dashboard Replica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white text-gray-800 p-4 md:p-8 font-sans">

    <div class="mb-6 flex items-baseline gap-2 border-b pb-4">
        <h1 class="text-2xl font-bold text-blue-500">Collected</h1>
        <span class="text-sm text-blue-400">From any of the crossings along Gaza's perimeter</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-gray-50/50 border border-gray-200 p-6 rounded-sm text-center shadow-sm">
            <div class="text-blue-500 font-medium mb-2 flex items-center justify-center gap-2">
                <i class="fa-solid fa-pallet"></i> Pallets
            </div>
            <div class="text-3xl text-blue-500 font-bold">461,029</div>
        </div>
        <div class="bg-gray-50/50 border border-gray-200 p-6 rounded-sm text-center shadow-sm">
            <div class="text-blue-500 font-medium mb-2 flex items-center justify-center gap-2">
                <i class="fa-solid fa-truck"></i> Trucks
            </div>
            <div class="text-3xl text-blue-500 font-bold">27,183</div>
        </div>
        <div class="bg-gray-50/50 border border-gray-200 p-6 rounded-sm text-center shadow-sm">
            <div class="text-blue-500 font-medium mb-2 flex items-center justify-center gap-2">
                <i class="fa-solid fa-weight-scale"></i> Weight (t)
            </div>
            <div class="text-3xl text-blue-500 font-bold">344,220.495</div>
        </div>
        <div class="bg-gray-50/50 border border-gray-200 p-6 rounded-sm text-center shadow-sm">
            <div class="text-blue-500 font-medium mb-2 flex items-center justify-center gap-2">
                <i class="fa-solid fa-file-lines"></i> Number of Requests
            </div>
            <div class="text-3xl text-blue-500 font-bold">4,925</div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <div class="border border-gray-200 p-4 rounded-sm shadow-sm relative flex flex-col items-center">
            <h2 class="text-xs font-bold text-gray-500 text-center mb-4">Collected Weight (t) by Commodity</h2>
            <div class="w-full flex justify-center items-center" style="height: 350px;">
                <canvas id="commodityPieChart"></canvas>
            </div>
        </div>

        <div class="border border-gray-200 p-4 rounded-sm shadow-sm relative">
            <h2 class="text-xs font-bold text-gray-500 text-center mb-4">Collected Daily Trends</h2>
            <div class="w-full" style="height: 350px;">
                <canvas id="dailyTrendsChart"></canvas>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="border border-gray-200 p-4 rounded-sm shadow-sm relative">
            <h2 class="text-xs font-bold text-gray-500 text-center mb-4">Weight (t) by Crossing Location and Commodity</h2>
            <div class="w-full" style="height: 350px;">
                <canvas id="crossingChart"></canvas>
            </div>
        </div>

        <div class="border border-gray-200 p-4 rounded-sm shadow-sm relative">
            <h2 class="text-xs font-bold text-gray-500 text-center mb-4">Total Trucks and Pallets by Organization</h2>
            <div class="w-full" style="height: 350px;">
                <canvas id="orgChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Common styling variables based on your screenshot
        const UN_BLUE = '#0077b6';
        const LIGHT_BLUE = '#00b4d8';
        const CYAN = '#48cae4';
        const ORANGE = '#f59e0b';
        const RED = '#ef4444';
        
        // 1. Pie Chart Configuration
        const ctxPie = document.getElementById('commodityPieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: ['Food (84.3%)', 'Shelter (5.6%)', 'Nutrition (3.6%)', 'WASH (3.6%)', 'Health (1.5%)', 'Ops-Logs-Telecoms (0.6%)', 'Other'],
                datasets: [{
                    data: [84.3, 5.6, 3.6, 3.6, 1.5, 0.6, 0.8],
                    backgroundColor: [UN_BLUE, LIGHT_BLUE, CYAN, '#0096c7', '#ade8f4', '#03045e', '#caf0f8'],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'left',
                        labels: { boxWidth: 20, font: { size: 10 } }
                    }
                }
            }
        });

        // 2. Daily Trends Combo Chart Configuration
        const ctxTrends = document.getElementById('dailyTrendsChart').getContext('2d');
        // Generating some dummy dates for the X-axis
        const labelsTrends = Array.from({length: 60}, (_, i) => `2025-0${(i%12)+1}-${(i%28)+1}`);
        new Chart(ctxTrends, {
            type: 'bar',
            data: {
                labels: labelsTrends,
                datasets: [
                    {
                        type: 'line',
                        label: 'Pallets',
                        data: Array.from({length: 60}, () => Math.floor(Math.random() * 5000) + 500),
                        borderColor: ORANGE,
                        backgroundColor: ORANGE,
                        borderWidth: 2,
                        tension: 0.1,
                        yAxisID: 'y1',
                        pointRadius: 2
                    },
                    {
                        type: 'line',
                        label: 'Trucks',
                        data: Array.from({length: 60}, () => Math.floor(Math.random() * 200) + 10),
                        borderColor: RED,
                        backgroundColor: RED,
                        borderWidth: 2,
                        tension: 0.1,
                        yAxisID: 'y1',
                        pointRadius: 0
                    },
                    {
                        type: 'bar',
                        label: 'Weight (t)',
                        data: Array.from({length: 60}, () => Math.floor(Math.random() * 3000) + 200),
                        backgroundColor: UN_BLUE,
                        yAxisID: 'y'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { ticks: { font: { size: 8 }, maxRotation: 45, minRotation: 45 } },
                    y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Weight (t)', font: { size: 10 } } },
                    y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Pallets / Trucks', font: { size: 10 } } }
                },
                plugins: { legend: { position: 'top', labels: { boxWidth: 15, font: { size: 10 } } } }
            }
        });

        // 3. Stacked Bar Crossing Chart Configuration
        const ctxCrossing = document.getElementById('crossingChart').getContext('2d');
        new Chart(ctxCrossing, {
            type: 'bar',
            data: {
                labels: ['Kerem Shalom', 'Kissufim', 'Zikim'],
                datasets: [
                    { label: 'Food', data: [200000, 10000, 75000], backgroundColor: UN_BLUE },
                    { label: 'Shelter', data: [15000, 1000, 5000], backgroundColor: LIGHT_BLUE },
                    { label: 'WASH', data: [10000, 500, 2000], backgroundColor: CYAN }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { stacked: true, grid: { display: false } },
                    y: { stacked: true, title: { display: true, text: 'Weight (t)', font: {size: 10} } }
                },
                plugins: { legend: { position: 'right', labels: { boxWidth: 15, font: { size: 10 } } } }
            }
        });

        // 4. Line Chart: Trucks & Pallets by Org
        const ctxOrg = document.getElementById('orgChart').getContext('2d');
        new Chart(ctxOrg, {
            type: 'line',
            data: {
                labels: ['WFP', 'World Central Kitchen', 'UNICEF', 'IOM', 'ICRC', 'WHO', 'Catholic Relief Services', 'UNDP', 'UNFPA', 'Time of Freedom'],
                datasets: [
                    {
                        label: 'Trucks',
                        data: [16000, 3500, 2000, 1000, 500, 300, 200, 150, 100, 50],
                        borderColor: LIGHT_BLUE,
                        backgroundColor: LIGHT_BLUE,
                        yAxisID: 'y',
                        tension: 0.4,
                        fill: false
                    },
                    {
                        label: 'Pallets',
                        data: [250000, 60000, 80000, 20000, 10000, 5000, 4000, 3000, 2000, 1000],
                        borderColor: ORANGE,
                        backgroundColor: ORANGE,
                        yAxisID: 'y1',
                        tension: 0.4,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { ticks: { font: { size: 9 }, maxRotation: 25, minRotation: 25 } },
                    y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Trucks', font: {size: 10} } },
                    y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Pallets', font: {size: 10} } }
                },
                plugins: { legend: { position: 'top', labels: { boxWidth: 15, font: { size: 10 } } } }
            }
        });
    </script>
</body>
</html>
